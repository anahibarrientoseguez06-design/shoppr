<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#16a34a" />
  <title>Sin conexión — Shoppr</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f9fafb;
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }

    .logo {
      font-size: 2rem;
      font-weight: 800;
      color: #16a34a;
      margin-bottom: 2rem;
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      background: #dcfce7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 40px;
      height: 40px;
      color: #16a34a;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #111827;
    }

    p {
      font-size: 1rem;
      color: #6b7280;
      max-width: 320px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    button {
      background: #16a34a;
      color: #ffffff;
      border: none;
      border-radius: 0.5rem;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #15803d;
    }

    button:active {
      transform: scale(0.98);
    }

    .tip {
      margin-top: 2rem;
      font-size: 0.875rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="logo">Shoppr</div>

  <div class="icon">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M18.364 5.636a9 9 0 010 12.728M5.636 5.636a9 9 0 000 12.728M9 10h.01M15 10h.01M9.5 15.5s1.5 2 2.5 2 2.5-2 2.5-2" />
      <line x1="2" y1="2" x2="22" y2="22" stroke-linecap="round" />
    </svg>
  </div>

  <h1>Sin conexión</h1>
  <p>Revisá tu conexión a internet y volvé a intentarlo.</p>

  <button onclick="window.location.reload()">Reintentar</button>

  <p class="tip">Shoppr requiere conexión para mostrarte los pedidos más recientes.</p>
</body>
</html>
